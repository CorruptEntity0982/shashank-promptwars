services:
  # Redis Queue Broker
  redis:
    image: redis:7-alpine
    container_name: lattice-redis
    ports:
      - "6379:6379"
    networks:
      - lattice-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15
    container_name: lattice-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
    networks:
      - lattice-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lattice-backend
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/tmp/openclaims_uploads
      - ${GCP_CREDENTIALS_DIR:-./secrets}:/gcp:ro
    environment:
      POSTGRES_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/${GCP_CREDENTIALS_FILE:-service-account.json}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - lattice-network

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lattice-worker
    command: celery -A celery_worker.celery_app worker --loglevel=info
    volumes:
      - uploads_data:/tmp/openclaims_uploads
      - ${GCP_CREDENTIALS_DIR:-./secrets}:/gcp:ro
    environment:
      POSTGRES_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/${GCP_CREDENTIALS_FILE:-service-account.json}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
    networks:
      - lattice-network

  # Frontend (Vite React with hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lattice-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - lattice-network

networks:
  lattice-network:
    driver: bridge

volumes:
  neo4j_data:
  uploads_data:
